      #     bq query --use_legacy_sql=false --format=csv --project_id=${{ secrets.GCP_PROJECT_ID }} \
      #       < sql/export_jobs.sql > exports/latest.csv
      #
      # - name: Build dashboard data
      #   run: python build.py --csv exports/latest.csv --days 90

      - name: Build dashboard data (manual CSV placeholder)
        if: false
        run: echo "Configure GCP export step above"

      - name: Commit updated data
        if: false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json meta.json
          git diff --staged --quiet || git commit -m "Automated BQ usage dashboard refresh"
          git push
