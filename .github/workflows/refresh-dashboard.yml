# Phase 2: enable when GCP credentials are available.
# Start with manual dispatch only; uncomment schedule when secrets are configured.

name: Refresh BQ dashboard

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '30 0 * * *'  # 06:00 IST daily

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

